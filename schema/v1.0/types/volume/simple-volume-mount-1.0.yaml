openapi: 3.1.0
info:
  title: IVOA ExecutionBroker volume mounts
  version: "1.0"
  summary: IVOA ExecutionBroker SimpleVolumeMount
  description: >-
    OpenAPI schema for a simple volume mount in IVOA ExecutionBroker
  contact:
    name: Dave Morris
    url: https://github.com/Zarquan
  license:
    name: Creative Commons Attribution Share Alike 4.0 International
    identifier: CC-BY-SA-4.0

components:
  schemas:

    SimpleVolumeMount:
      type: object
      title: SimpleVolumeMount
      description: >-
        A simple volume mount.
      allOf:
        # $ref: '../../openapi.yaml#AbstractVolumeMount'
        - $ref: '../../components.yaml#/components/schemas/AbstractVolumeMount'
        - type: object
          properties:
            path:
              description: >
                The filesystem mount point.
              type: string
            mode:
              description: >
                The read-write access mode.
              type: string
              enum:
                - READONLY
                - READWRITE
            cardinality:
              description: >
                If cardinality is set to SINGLE, then this volume-mount will mount a single resource at the location set by the path.
                If cardinality is set to CONTAINER, then this volume-mount will create a directory at the location set by the path,
                and mount the resources within that directory.
              type: string
              enum:
                - SINGLE
                - CONTAINER
            resources:
              description: >
                A list of the data resources to mount in this volume.
                If cardinality is set to SINGLE then this list should only contain one resource.
                If cardinality is set to SINGLE and this list has more than one resource, then it should fail validation.
                If cardinality is set to CONTAINER then this list may contain more than one resource.
              type: array
              items:
                type: string

