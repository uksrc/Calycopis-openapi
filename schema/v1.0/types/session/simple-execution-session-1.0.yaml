openapi: 3.1.0
info:
  title: SimpleExecutionSession
  version: "1.0"
  summary: A simple execution session
  description: >-
    Metadata describing a simple execution session.
  contact:
    name: Dave Morris
    url: https://github.com/Zarquan
  license:
    name: Creative Commons Attribution Share Alike 4.0 International
    identifier: CC-BY-SA-4.0

components:
  schemas:

    SimpleExecutionComponents:
      description: >-
        The combination of an executable and the compute, storage, volumes, and data resources it needs.
      type: object
      title: SimpleExecutionComponents
      properties:
        executable:
          $ref: '../../components.yaml#/components/schemas/AbstractExecutable'
        compute:
          $ref: '../../components.yaml#/components/schemas/AbstractComputeResource'
        storage:
          $ref: '../../components.yaml#/components/schemas/AbstractStorageResourceList'
        volumes:
          $ref: '../../components.yaml#/components/schemas/AbstractVolumeMountList'
        data:
          $ref: '../../components.yaml#/components/schemas/AbstractDataResourceList'

    SimpleExecutionSessionPhase:
      description: >-
        The Execution Session phase.
      type: string
      title: SimpleExecutionSessionPhase
      enum:
        - INITIAL
        - OFFERED
        - ACCEPTED
        - REJECTED
        - EXPIRED

        - WAITING
        - PREPARING
        - AVAILABLE
        - RUNNING
        - RELEASING

        - COMPLETED
        - FAILED
        - CANCELLED

    # TODO Expand this with an abstract base class and kind discriminator.
    # TODO Add nems, descriptions and logos to the derived classes.
    SimpleSessionConnector:
      description: |
        A connector to interact with the session.
      type: object
      title: SimpleSessionConnector
      properties:
        kind:
          type: string
          description: >-
            A URI to identify the type of connector.
        status:
          type: string
          enum:
            - PREPARING
            - AVAILABLE
            - FINISHED
          description: >-
            A flag to indicate the staus of the access method.
        protocol:
          type: string
          description: >-
            The access protocol, provided by the server when an offer is made.
            Typically one of [TCP, HTTP, HTTPS].
        location:
          type: string
          description: >-
            The access connector URL.

    SimpleSessionConnectorList:
      description: >-
        A list of connection endpoints.
      type: array
      title: SimpleSessionConnectorList
      xml:
        name: connector
      items:
        $ref: 'SimpleSessionConnector'

    SimpleExecutionSession:
      description: >-
        A simple execution session.
      type: object
      title: SimpleExecutionSession
      xml:
        name: execution
      allOf:
        - $ref: '../../components.yaml#/components/schemas/AbstractExecutionSession'
        - type: object
          properties:
            phase:
              $ref: 'SimpleExecutionSessionPhase'
            expires:
              description: >-
                The date and time when this offer expires.
                Only valid while the state is OFFERED.
              xml:
                name: expires
              type: string
              format: date-time
        - $ref: 'SimpleExecutionComponents'
        - type: object
          properties:
            connectors:
              description: >-
                A list of connectors to interact with the session.
              $ref: 'SimpleSessionConnectorList'

