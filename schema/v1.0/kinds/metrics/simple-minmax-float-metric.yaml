openapi: 3.1.0
info:
  title: IVOA ExecutionBroker simple min/max float metric
  version: "1.0"
  summary: IVOA ExecutionBroker simple min/max float metric
  description: >-
    OpenAPI schema for a simple min/max float metric in IVOA ExecutionBroker
  contact:
    name: Dave Morris
    url: https://github.com/Zarquan
  license:
    name: Creative Commons Attribution Share Alike 4.0 International
    identifier: CC-BY-SA-4.0

components:
  schemas:

    SimpleMinMaxFloatMetric:
      description: >-
        A basic numeric minimum and maximum value for a metric.
        Both values are optional.
        The client can use this kind of metric to specify the minimum performance they require,
        and the service can quote the minimum and maximum performance that the platform can provide.
      type: object
      title: SimpleMinMaxFloatMetric
      allOf:
        - $ref: './abstract-metric-item.yaml#/components/schemas/AbstractMetricItem'
        - type: object
          properties:
            min:
              description: >-
                The minimum metric value.
              type: number
              format: float
            max:
              description: >-
                The maximum metric value.
              type: number
              format: float
