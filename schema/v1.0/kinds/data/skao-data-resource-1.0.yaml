openapi: 3.1.0
info:
  title: SkaoDataResource
  version: "1.0"
  summary: A SKAO data resource
  description: >-
    Metadata describing a SKAO data resource in the data lake.
  contact:
    name: Dave Morris
    url: https://github.com/Zarquan
  license:
    name: Creative Commons Attribution Share Alike 4.0 International
    identifier: CC-BY-SA-4.0

components:
  schemas:

    SkaoDataResource:
      type: object
      title: SkaoDataResource
      description: >-
        Metadata describing a SKAO data resource in the data lake.
        SkaoDataResource extends AbstractDataResource directly (as a sibling of
        IvoaDataResource) rather than extending IvoaDataResource, to avoid a
        recursive discriminator bug in the OpenAPI Python code generator.
        The IvoaDataResourceBlock is included explicitly to preserve the same
        JSON shape as if SkaoDataResource were a child of IvoaDataResource.
      allOf:
        - $ref: '../../components.yaml#/components/schemas/AbstractDataResource'
        - type: object
          properties:
            ivoa:
              $ref: './ivoa-data-resource-1.0.yaml#/components/schemas/IvoaDataResourceBlock'
            skao:
              $ref: '#/components/schemas/SkaoDataResourceBlock'

    SkaoDataResourceBlock:
      type: object
      title: SkaoDataResourceBlock
      description: >-
        A reusable block describing the metadata for a SKAO data resource.
      properties:
        namespace:
          description: >-
            The DM-API namespace (equivalent to the Rucio scope).
          type: string
        objectname:
          description: >-
            The DM-API object name.
          type: string
        objecttype:
          description: >-
            The data object type.
          type: string
          enum:
            - "FILE"
            - "CONTAINER"
            - "DATASET"
        datasize:
          type: integer
          format: int64
        checksum:
          $ref: '#/components/schemas/SkaoChecksumItem'
        replicas:
          description: >-
            A list of known replicas.
          type: array
          items:
            $ref: '#/components/schemas/SkaoReplicaItem'

    SkaoChecksumItem:
      type: object
      title: SkaoChecksumItem
      properties:
        type:
          type: string
        value:
          type: string

    SkaoReplicaItem:
      type: object
      title: SkaoReplicaItem
      description: >-
        Metadata about a replica in an RSE.
      properties:
        rsename:
          description: >-
            The RSE name.
          type: string
        dataurl:
          description: >-
            The URL/URI of the object within the RSE.
          type: string





