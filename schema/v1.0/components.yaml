openapi: 3.1.0
info:
  title: IVOA ExecutionBroker
  version: "1.0"
  summary: IVOA ExecutionBroker interface
  description: >-
    IVOA ExecutionBroker interface
  contact:
    name: Dave Morris
    url: https://github.com/Zarquan
  license:
    name: Creative Commons Attribution Share Alike 4.0 International
    identifier: CC-BY-SA-4.0

components:
  schemas:

# components.yaml

    ComponentMetadata:
      description: >-
        A metadata block for our components.
        This includes a name, a UUID identifier, a URL, and lists of the messages and options.
      type: object
      title: ComponentMetadata
      properties:
        uuid:
          description: >-
            A machine readable UUID, assigned when a component is created in a service.
          type: string
          format: uuid
        name:
          description: >-
            A human readable name, assigned by the client.
          type: string
        url:
          description: >-
            The URL to access this component.
          type: string
          format: uri
        description:
          description: >-
            A human readable description.
          type: string
        created:
          description: >-
            The date and time the component was created.
          type: string
          format: date-time
        modified:
          description: >-
            The date and time the component was last modified.
          type: string
          format: date-time
        messages:
          description: >-
            A list of messages about this component.
          type: array
          xml:
            name: messages
          items:
            $ref: './components/messages.yaml#/components/schemas/MessageItem'
            xml:
              name: message
        options:
          description: >-
            A List of options the client can apply to this component.
          type: array
          xml:
            name: options
          items:
            $ref: 'AbstractOption'

    AbstractComponent:
      description: >-
        Abstract base class for all our components.
      type: object
      title: AbstractComponent
      properties:
        kind:
          description: >-
            The component type identifier.
          type: string
          format: uri
          xml:
            attribute: true
        meta:
          description: >-
            The component metadata.
          $ref: 'ComponentMetadata'

    LifecyclePhase:
      description: >-
        Lifecycle phase values.
      type: string
      title: LifecyclePhase
      enum:
            - INITIALIZING

            - WAITING
            - PREPARING
            - AVAILABLE
            - RUNNING
            - RELEASING

            - COMPLETED
            - FAILED
            - CANCELLED

    LifecycleDuration:
      description: >-
        A lifecycle duration.
      type: object
      title: LifecycleDuration
      properties:
        duration:
          $ref: './components/utils.yaml#/components/schemas/ISO8601Duration'

    LifecycleStartDurationInstant:
      description: >-
        A lifecycle instant and duration.
      type: object
      title: LifecycleStartDurationInstant
      properties:
        start:
          $ref: './components/utils.yaml#/components/schemas/ISO8601Instant'
        duration:
          $ref: './components/utils.yaml#/components/schemas/ISO8601Duration'

    LifecycleStartDurationInterval:
      description: >-
        A lifecycle interval and duration.
      type: object
      title: LifecycleStartDurationInterval
      properties:
        start:
          $ref: './components/utils.yaml#/components/schemas/ISO8601Interval'
        duration:
          $ref: './components/utils.yaml#/components/schemas/ISO8601Duration'

    LifecycleDoneDurationInterval:
      description: >-
        A lifecycle interval and duration.
      type: object
      title: LifecycleDoneDurationInterval
      properties:
        done:
          $ref: './components/utils.yaml#/components/schemas/ISO8601Interval'
        duration:
          $ref: './components/utils.yaml#/components/schemas/ISO8601Duration'

    LifecycleSchedule:
      description: >-
        Lifecycle schedule.
      type: object
      title: LifecycleSchedule
      properties:
        preparing:
          $ref: 'LifecycleStartDurationInstant'
        available:
          $ref: 'LifecycleStartDurationInterval'
        releasing:
          $ref: 'LifecycleStartDurationInstant'

    LifecycleComponent:
      description: >-
        A component with a lifecycle.
      type: object
      title: LifecycleComponent
      properties:
        phase:
          description: >-
            The lifecycle phase.
          xml:
            name: phase
          $ref: 'LifecyclePhase'
        schedule:
          description: >-
            The lifecycle schedule.
          xml:
            name: schedule
          $ref: 'LifecycleSchedule'

# abstract-compute-resource.yaml

    AbstractComputeResource:
      description: >-
        Abstract base class for compute resources.
      type: object
      title: AbstractComputeResource
      required:
        - kind
      discriminator:
        propertyName: kind
        mapping:
          "https://www.purl.org/ivoa.net/EB/schema/v1.0/types/compute/simple-compute-resource-1.0": './types/compute/simple-compute-resource-1.0.yaml#/components/schemas/SimpleComputeResource'
      allOf:
        - $ref: 'AbstractComponent'
        - $ref: 'LifecycleComponent'

# abstract-volume-mount.yaml

    AbstractVolumeMount:
      description: >-
        Abstract base class for volume mounts.
      type: object
      title: AbstractVolumeMount
      required:
        - kind
      discriminator:
        propertyName: kind
        mapping:
          "https://www.purl.org/ivoa.net/EB/schema/v1.0/types/volume/simple-volume-mount-1.0": './types/volume/simple-volume-mount-1.0.yaml#/components/schemas/SimpleVolumeMount'
      allOf:
        - $ref: 'AbstractComponent'

    AbstractVolumeMountList:
      description: >-
        A list of abstract volume mounts.
      type: array
      title: AbstractVolumeMountList
      xml:
        name: volumes
      items:
        $ref: 'AbstractVolumeMount'

# abstract-storage-resources.yaml

    AbstractStorageResource:
      description: >-
        Abstract base class for storage resources.
      type: object
      title: AbstractStorageResource
      required:
        - kind
      discriminator:
        propertyName: kind
        mapping:
          "https://www.purl.org/ivoa.net/EB/schema/v1.0/types/storage/simple-storage-resource-1.0": './types/storage/simple-storage-resource-1.0.yaml#/components/schemas/SimpleStorageResource'
      allOf:
        - $ref: 'AbstractComponent'
        - $ref: 'LifecycleComponent'
        - type: object
          properties:
            data:
              type: array
              items:
                type: string

    AbstractStorageResourceList:
      description: >-
        A list of abstract storage resources.
      type: array
      title: AbstractStorageResourceList
      xml:
        name: storage
      items:
        $ref: 'AbstractStorageResource'

# abstract-data-resource.yaml

    AbstractDataResource:
      description: >-
        Abstract base class for data resources.
      type: object
      title: AbstractDataResource
      required:
        - kind
      discriminator:
        propertyName: kind
        mapping:
          "https://www.purl.org/ivoa.net/EB/schema/v1.0/types/data/simple-data-resource-1.0": './types/data/simple-data-resource-1.0.yaml#/components/schemas/SimpleDataResource'
          "https://www.purl.org/ivoa.net/EB/schema/v1.0/types/data/S3-data-resource-1.0":     './types/data/S3-data-resource-1.0.yaml#/components/schemas/S3DataResource'
          "https://www.purl.org/ivoa.net/EB/schema/v1.0/types/data/rucio-data-resource-1.0":  './types/data/rucio-data-resource-1.0.yaml#/components/schemas/RucioDataResource'
          "https://www.purl.org/ivoa.net/EB/schema/v1.0/types/data/ivoa-data-resource-1.0":   './types/data/ivoa-data-resource-1.0.yaml#/components/schemas/IvoaDataResource'
          "https://www.purl.org/ivoa.net/EB/schema/v1.0/types/data/skao-data-resource-1.0":   './types/data/skao-data-resource-1.0.yaml#/components/schemas/SkaoDataResource'
      allOf:
        - $ref: 'AbstractComponent'
        - $ref: 'LifecycleComponent'
        - type: object
          properties:
            storage:
              type: string

    AbstractDataResourceList:
      description: >-
        A list of abstract data resources.
      type: array
      title: AbstractDataResourceList
      xml:
        name: data
      items:
        $ref: 'AbstractDataResource'

# abstract-executable.yaml

    AbstractExecutable:
      description: Abstract base class for executables.
      type: object
      title: AbstractExecutable
      required:
        - kind
      discriminator:
        propertyName: kind
        mapping:
          "https://www.purl.org/ivoa.net/EB/schema/v1.0/types/executable/docker-container-1.0":      './types/executable/docker-container-1.0.yaml#/components/schemas/DockerContainer'
          "https://www.purl.org/ivoa.net/EB/schema/v1.0/types/executable/singularity-container-1.0": './types/executable/singularity-container-1.0.yaml#/components/schemas/SingularityContainer'
          "https://www.purl.org/ivoa.net/EB/schema/v1.0/types/executable/jupyter-notebook-1.0":      './types/executable/jupyter-notebook-1.0.yaml#/components/schemas/JupyterNotebook'
      allOf:
        - $ref: 'AbstractComponent'
        - $ref: 'LifecycleComponent'

# update-options.yaml

    AbstractOption:
      description: >-
        Abstract base class for describing options.
        This includes the `type` discriminator and the target `path` to update.
      type: object
      title: AbstractOption
      required:
        - kind
        - path
      discriminator:
        propertyName: kind
        mapping:
          "uri:string-value-option":  '#/components/schemas/StringValueOption'
          "uri:enum-value-option":    '#/components/schemas/EnumValueOption'
          "uri:integer-value-option": '#/components/schemas/IntegerValueOption'
          "uri:integer-delta-option": '#/components/schemas/IntegerDeltaOption'
      properties:
        kind:
          description: >-
            The kind of option.
          type: string
          xml:
            attribute: true
        path:
          description: >-
            The path this option applies to.
          type: string
          xml:
            attribute: false

    StringValueOption:
      description: >-
        A simple string value option.
        This option enables the client to set a string value pointed to by the path.
      type: object
      title: StringValueOption
      allOf:
        - $ref: 'AbstractOption'
        - type: object
          properties:
            pattern:
              description: >-
                A regular expression pattern restricting the value.
              type: string

    EnumValueOption:
      description: >-
        A simple enum value option.
        This option enables the client to set an enum value pointed to by the path.
      type: object
      title: EnumValueOption
      required:
        - values
      allOf:
        - $ref: 'AbstractOption'
        - type: object
          properties:
            values:
              description: >-
                The list of available options.
              type: array
              items:
                type: string

    IntegerValueOption:
      description: >-
        A simple integer value option.
        This option enables the client to set an integer value pointed to by the path.
      type: object
      title: IntegerValueOption
      allOf:
        - $ref: 'AbstractOption'
        - type: object
          properties:
            min:
              description: >-
                The minimum value that can be set.
              type: integer
              format: int64
            max:
              description: >-
                The maximum value that can be set.
              type: integer
              format: int64
            units:
              description: >-
                The units used for the maximum and minimum values
                and the default units used for the update.
                The client may specify different units in the
                update if they need to.
              type: string

    IntegerDeltaOption:
      description: >-
        A simple integer delta option.
        This option enables the client to increment or decrement an integer value pointed to by the path.
      type: object
      title: IntegerDeltaOption
      allOf:
        - $ref: 'AbstractOption'
        - type: object
          properties:
            min:
              description: >-
                The minimum change that can be applied.
              type: integer
              format: int64
            max:
              description: >-
                The maximum change that can be applied.
              type: integer
              format: int64
            units:
              description: >-
                The units used for the maximum and minimum values
                and the default units used for the update.
                The client may specify different units in the
                update if they need to.
              type: string

# update-actions.yaml

    AbstractUpdate:
      description: >-
        Abstract base class for updates.
        This includes the `type` discriminator and the target `path` to update.
      type: object
      title: AbstractUpdate
      required:
        - kind
        - path
      discriminator:
        propertyName: kind
        mapping:
          "uri:string-value-update":  '#/components/schemas/StringValueUpdate'
          "uri:enum-value-update":    '#/components/schemas/EnumValueUpdate'
          "uri:integer-value-update": '#/components/schemas/IntegerValueUpdate'
          "uri:integer-delta-update": '#/components/schemas/IntegerDeltaUpdate'
      properties:
        kind:
          description: >-
            The kind of update.
          type: string
          xml:
            attribute: true
        path:
          description: >-
            The path this update applies to.
          type: string
          xml:
            attribute: false

    StringValueUpdate:
      description: >-
        A simple string value update.
      type: object
      title: StringValueUpdate
      required:
        - value
      allOf:
        - $ref: 'AbstractUpdate'
        - type: object
          properties:
            value:
              description: >-
                The string value to use.
              type: string

    EnumValueUpdate:
      description: >-
        A simple enum value update.
      type: object
      title: EnumValueUpdate
      required:
        - value
      allOf:
        - $ref: 'AbstractUpdate'
        - type: object
          properties:
            value:
              description: >-
                The enum value to use.
              type: string

    IntegerValueUpdate:
      description: >-
        A simple integer value update.
      type: object
      title: IntegerValueUpdate
      required:
        - value
      allOf:
        - $ref: 'AbstractUpdate'
        - type: object
          properties:
            value:
              description: >-
                The integer value to use.
              type: integer
              format: int64
            units:
              description: >-
                The units to use for the value.
              type: string

    IntegerDeltaUpdate:
      description: >-
        A simple integer delta update.
        This increments or decrements the target value by the specified amount.
      type: object
      title: IntegerDeltaUpdate
      required:
        - delta
      allOf:
        - $ref: 'AbstractUpdate'
        - type: object
          properties:
            delta:
              description: >-
                The increment or decrement to apply.
              type: integer
              format: int64
            units:
              description: >-
                The units to use for the change.
              type: string

    # TODO Move this to utils ?
    # TODO Remove this - not used.
    MinMaxDuration:
      description: >-
        A duration time block describing how long the execution will take.
        The max and min values are expressed as ISO 8601 time durations.
        See https://en.wikipedia.org/wiki/ISO_8601#Durations
      type: object
      title: MinMaxDuration
      xml:
        name: duration
      properties:
        min:
          type: string
        max:
          type: string

    # TODO This should be is-a AbstractUpdate rather than has-a AbstractUpdate
    UpdateRequest:
      description: >-
        A request to update an execution.
      type: object
      title: UpdateRequest
      xml:
        name: update-request
      properties:
        update:
          xml:
            name: update
          $ref: 'AbstractUpdate'

# abstract-session.yaml

    AbstractExecutionSession:
      description: >-
        Abstract base class for execution sessions.
      type: object
      title: AbstractExecutionSession
      required:
        - kind
      discriminator:
        propertyName: kind
        mapping:
          "https://www.purl.org/ivoa.net/EB/schema/v1.0/types/session/simple-execution-session-1.0":    './types/session/simple-execution-session-1.0.yaml#/components/schemas/SimpleExecutionSession'
         #"https://www.purl.org/ivoa.net/EB/schema/v1.0/types/session/scheduled-execution-session-1.0": './types/session/scheduled-execution-session-1.0.yaml#/components/schemas/ScheduledExecutionSession'
      allOf:
        - $ref: 'AbstractComponent'

# session-response.yaml

    ExecutionSessionResponse:
      description: >-
        Container class for execution session responses.
      type: object
      title: ExecutionSessionResponse
      allOf:
        - $ref: 'AbstractExecutionSession'

# offersets.yaml

    RequestedScheduleItem:
      description: >-
        The requested schedule.
      type: object
      title: RequestedScheduleItem
      properties:
        duration:
          description: >-
            The requested duration.
          $ref: './components/utils.yaml#/components/schemas/ISO8601Duration'
        start:
          description: >-
            The requested start interval.
          $ref: './components/utils.yaml#/components/schemas/ISO8601Interval'

    RequestedScheduleBlock:
      description: >-
        The requested schedule.
      type: object
      title: RequestedScheduleBlock
      properties:
        requested:
          $ref: 'RequestedScheduleItem'

    OfferSetRequest:
      description: >-
        A request for a set of offers for an execution.
      type: object
      title: OfferSetRequest
      xml:
        name: offers-request
      allOf:
        - $ref: 'SimpleExecutionComponents'
        - type: object
          properties:
            schedule:
              xml:
                name: schedule
              $ref: 'RequestedScheduleBlock'

    OfferSetResponse:
      description: >-
        A set of executions offered in response to a request,
        including a uuid, href, and an expiry date for the set.
      type: object
      title: OfferSetResponse
      xml:
        name: offers-response
      allOf:
        - $ref: 'AbstractComponent'
        - type: object
          properties:
            result:
              description: >-
                A flag to indicate whether the request can be handled by this service.
                If service is able to handle the request, then the `result` will be `YES`
                and the `offers` block should contain one or more offers.
                If service is not able to handle the request, the `result` will be `NO`
                and the `messages` block should contain one or more reasons explaining why.
              type: string
              enum:
                - "YES"
                - "NO"
            description:
              description: >-
                A human readable description.
              type: string
            offers:
              type: array
              xml:
                name: offers
                wrapped: true
              items:
                $ref: 'ExecutionSessionResponse'
                xml:
                  name: execution



