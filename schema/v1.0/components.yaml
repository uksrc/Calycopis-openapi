openapi: 3.1.0
info:
  title: IVOA ExecutionBroker components
  version: "1.0"
  summary: IVOA ExecutionBroker components
  description: >-
    Components for the the IVOA ExecutionBroker OpenAPI schema.
  contact:
    name: Dave Morris
    url: https://github.com/Zarquan
  license:
    name: Creative Commons Attribution Share Alike 4.0 International
    identifier: CC-BY-SA-4.0

components:
  schemas:

# components.yaml

    ComponentMetadata:
      description: >-
        A metadata block for our components.
        This includes a name, a UUID identifier, a URL, and lists of the messages and options.
      type: object
      title: ComponentMetadata
      properties:
        uuid:
          description: >-
            A machine readable UUID, assigned when a component is created in a service.
          type: string
          format: uuid
        name:
          description: >-
            A human readable name, assigned by the client.
          type: string
        url:
          description: >-
            The URL to access this component.
          type: string
          format: uri
        description:
          description: >-
            A human readable description.
          type: string
        created:
          description: >-
            The date and time the component was created.
          type: string
          format: date-time
        modified:
          description: >-
            The date and time the component was last modified.
          type: string
          format: date-time
        messages:
          description: >-
            A list of messages about this component.
          type: array
          xml:
            name: messages
          items:
            $ref: './messages.yaml#/components/schemas/MessageItem'
            xml:
              name: message
        options:
          description: >-
            A List of options the client can apply to this component.
          type: array
          xml:
            name: options
          items:
            $ref: '#/components/schemas/AbstractOption'

    AbstractComponent:
      description: >-
        Abstract base class for all our components.
      type: object
      title: AbstractComponent
      properties:
        kind:
          description: >-
            The component type identifier.
          type: string
          format: uri
          xml:
            attribute: true
        meta:
          description: >-
            The component metadata.
          $ref: '#/components/schemas/ComponentMetadata'
        costs:
          description: >-
            A list of costs associated with this component.
          $ref: './kinds/costs/abstract-cost-item.yaml#/components/schemas/AbstractCostItemList'
        metrics:
          description: >-
            A list of metrics associated with this component.
          $ref: './kinds/metrics/abstract-metric-item.yaml#/components/schemas/AbstractMetricItemList'

    LifecyclePhase:
      description: >-
        Lifecycle phase values.
      type: string
      title: LifecyclePhase
      enum:
            - INITIALIZING

            - WAITING
            - PREPARING
            - AVAILABLE
            - RUNNING
            - RELEASING

            - COMPLETED
            - FAILED
            - CANCELLED

    LifecycleDuration:
      description: >-
        A lifecycle duration.
      type: object
      title: LifecycleDuration
      properties:
        duration:
          $ref: './utils.yaml#/components/schemas/ISO8601Duration'

    LifecycleStartDurationInstant:
      description: >-
        A lifecycle instant and duration.
      type: object
      title: LifecycleStartDurationInstant
      properties:
        start:
          $ref: './utils.yaml#/components/schemas/ISO8601Instant'
        duration:
          $ref: './utils.yaml#/components/schemas/ISO8601Duration'

    LifecycleStartDurationInterval:
      description: >-
        A lifecycle interval and duration.
      type: object
      title: LifecycleStartDurationInterval
      properties:
        start:
          $ref: './utils.yaml#/components/schemas/ISO8601Interval'
        duration:
          $ref: './utils.yaml#/components/schemas/ISO8601Duration'

    LifecycleDoneDurationInterval:
      description: >-
        A lifecycle interval and duration.
      type: object
      title: LifecycleDoneDurationInterval
      properties:
        done:
          $ref: './utils.yaml#/components/schemas/ISO8601Interval'
        duration:
          $ref: './utils.yaml#/components/schemas/ISO8601Duration'

    LifecycleSchedule:
      description: >-
        Lifecycle schedule.
      type: object
      title: LifecycleSchedule
      properties:
        preparing:
          $ref: '#/components/schemas/LifecycleStartDurationInstant'
        available:
          $ref: '#/components/schemas/LifecycleStartDurationInterval'
        releasing:
          $ref: '#/components/schemas/LifecycleStartDurationInstant'

    LifecycleComponent:
      description: >-
        A component with a lifecycle.
      type: object
      title: LifecycleComponent
      properties:
        phase:
          description: >-
            The lifecycle phase.
          xml:
            name: phase
          $ref: '#/components/schemas/LifecyclePhase'
        schedule:
          description: >-
            The lifecycle schedule.
          xml:
            name: schedule
          $ref: '#/components/schemas/LifecycleSchedule'

# abstract-compute-resource.yaml

    AbstractComputeResource:
      description: >-
        Abstract base class for compute resources.
      type: object
      title: AbstractComputeResource
      required:
        - kind
      discriminator:
        propertyName: kind
        mapping:
          "https://www.purl.org/ivoa.net/Calycopis-openapi/schema/v1.0/kinds/compute/simple-compute-resource.yaml": './kinds/compute/simple-compute-resource.yaml#/components/schemas/SimpleComputeResource'
      allOf:
        - $ref: '#/components/schemas/AbstractComponent'
        - $ref: '#/components/schemas/LifecycleComponent'
        - type: object
          properties:
            volumes:
              $ref: '#/components/schemas/AbstractVolumeMountList'

# abstract-volume-mount.yaml

    AbstractVolumeMount:
      description: >-
        Abstract base class for volume mounts.
      type: object
      title: AbstractVolumeMount
      required:
        - kind
      discriminator:
        propertyName: kind
        mapping:
          "https://www.purl.org/ivoa.net/Calycopis-openapi/schema/v1.0/kinds/volume/simple-volume-mount.yaml":    './kinds/volume/simple-volume-mount.yaml#/components/schemas/SimpleVolumeMount'
      allOf:
        - $ref: '#/components/schemas/AbstractComponent'

    AbstractVolumeMountList:
      description: >-
        A list of abstract volume mounts.
      type: array
      title: AbstractVolumeMountList
      xml:
        name: volumes
      items:
        $ref: '#/components/schemas/AbstractVolumeMount'

# abstract-storage-resources.yaml

    AbstractStorageResource:
      description: >-
        Abstract base class for storage resources.
      type: object
      title: AbstractStorageResource
      required:
        - kind
      discriminator:
        propertyName: kind
        mapping:
          "https://www.purl.org/ivoa.net/Calycopis-openapi/schema/v1.0/kinds/storage/simple-storage-resource.yaml": './kinds/storage/simple-storage-resource.yaml#/components/schemas/SimpleStorageResource'
      allOf:
        - $ref: '#/components/schemas/AbstractComponent'
        - $ref: '#/components/schemas/LifecycleComponent'
        - type: object
          properties:
            data:
              type: array
              items:
                type: string

    AbstractStorageResourceList:
      description: >-
        A list of abstract storage resources.
      type: array
      title: AbstractStorageResourceList
      xml:
        name: storage
      items:
        $ref: '#/components/schemas/AbstractStorageResource'

# abstract-data-resource.yaml

    AbstractDataResource:
      description: >-
        Abstract base class for data resources.
      type: object
      title: AbstractDataResource
      required:
        - kind
      discriminator:
        propertyName: kind
        mapping:
          "https://www.purl.org/ivoa.net/Calycopis-openapi/schema/v1.0/kinds/data/simple-data-resource.yaml": './kinds/data/simple-data-resource.yaml#/components/schemas/SimpleDataResource'
          "https://www.purl.org/ivoa.net/Calycopis-openapi/schema/v1.0/kinds/data/S3-data-resource.yaml":     './kinds/data/S3-data-resource.yaml#/components/schemas/S3DataResource'
          "https://www.purl.org/ivoa.net/Calycopis-openapi/schema/v1.0/kinds/data/rucio-data-resource.yaml":  './kinds/data/rucio-data-resource.yaml#/components/schemas/RucioDataResource'
          "https://www.purl.org/ivoa.net/Calycopis-openapi/schema/v1.0/kinds/data/ivoa-data-resource.yaml":   './kinds/data/ivoa-data-resource.yaml#/components/schemas/IvoaDataResource'
          "https://www.purl.org/ivoa.net/Calycopis-openapi/schema/v1.0/kinds/data/skao-data-resource.yaml":   './kinds/data/skao-data-resource.yaml#/components/schemas/SkaoDataResource'
      allOf:
        - $ref: '#/components/schemas/AbstractComponent'
        - $ref: '#/components/schemas/LifecycleComponent'
        - type: object
          properties:
            storage:
              type: string

    AbstractDataResourceList:
      description: >-
        A list of abstract data resources.
      type: array
      title: AbstractDataResourceList
      xml:
        name: data
      items:
        $ref: '#/components/schemas/AbstractDataResource'

# abstract-executable.yaml

    AbstractExecutable:
      description: Abstract base class for executables.
      type: object
      title: AbstractExecutable
      required:
        - kind
      discriminator:
        propertyName: kind
        mapping:
          "https://www.purl.org/ivoa.net/Calycopis-openapi/schema/v1.0/kinds/executable/docker-container.yaml":      './kinds/executable/docker-container.yaml#/components/schemas/DockerContainer'
          "https://www.purl.org/ivoa.net/Calycopis-openapi/schema/v1.0/kinds/executable/singularity-container.yaml": './kinds/executable/singularity-container.yaml#/components/schemas/SingularityContainer'
          "https://www.purl.org/ivoa.net/Calycopis-openapi/schema/v1.0/kinds/executable/jupyter-notebook.yaml":      './kinds/executable/jupyter-notebook.yaml#/components/schemas/JupyterNotebook'
      allOf:
        - $ref: '#/components/schemas/AbstractComponent'
        - $ref: '#/components/schemas/LifecycleComponent'

# update-options.yaml

    AbstractOption:
      description: >-
        Abstract base class for describing options.
        This includes the `type` discriminator and the target `path` to update.
      type: object
      title: AbstractOption
      required:
        - kind
        - path
      discriminator:
        propertyName: kind
        mapping:
          "uri:string-value-option":  '#/components/schemas/StringValueOption'
          "uri:enum-value-option":    '#/components/schemas/EnumValueOption'
          "uri:integer-value-option": '#/components/schemas/IntegerValueOption'
          "uri:integer-delta-option": '#/components/schemas/IntegerDeltaOption'
      properties:
        kind:
          description: >-
            The kind of option.
          type: string
          xml:
            attribute: true
        path:
          description: >-
            The path this option applies to.
          type: string
          xml:
            attribute: false

    StringValueOption:
      description: >-
        A simple string value option.
        This option enables the client to set a string value pointed to by the path.
      type: object
      title: StringValueOption
      allOf:
        - $ref: '#/components/schemas/AbstractOption'
        - type: object
          properties:
            pattern:
              description: >-
                A regular expression pattern restricting the value.
              type: string

    EnumValueOption:
      description: >-
        A simple enum value option.
        This option enables the client to set an enum value pointed to by the path.
      type: object
      title: EnumValueOption
      required:
        - values
      allOf:
        - $ref: '#/components/schemas/AbstractOption'
        - type: object
          properties:
            values:
              description: >-
                The list of available options.
              type: array
              items:
                type: string

    IntegerValueOption:
      description: >-
        A simple integer value option.
        This option enables the client to set an integer value pointed to by the path.
      type: object
      title: IntegerValueOption
      allOf:
        - $ref: '#/components/schemas/AbstractOption'
        - type: object
          properties:
            min:
              description: >-
                The minimum value that can be set.
              type: integer
              format: int64
            max:
              description: >-
                The maximum value that can be set.
              type: integer
              format: int64
            units:
              description: >-
                The units used for the maximum and minimum values
                and the default units used for the update.
                The client may specify different units in the
                update if they need to.
              type: string

    IntegerDeltaOption:
      description: >-
        A simple integer delta option.
        This option enables the client to increment or decrement an integer value pointed to by the path.
      type: object
      title: IntegerDeltaOption
      allOf:
        - $ref: '#/components/schemas/AbstractOption'
        - type: object
          properties:
            min:
              description: >-
                The minimum change that can be applied.
              type: integer
              format: int64
            max:
              description: >-
                The maximum change that can be applied.
              type: integer
              format: int64
            units:
              description: >-
                The units used for the maximum and minimum values
                and the default units used for the update.
                The client may specify different units in the
                update if they need to.
              type: string

# update-actions.yaml

    AbstractUpdate:
      description: >-
        Abstract base class for updates.
        This includes the `type` discriminator and the target `path` to update.
      type: object
      title: AbstractUpdate
      required:
        - kind
        - path
      discriminator:
        propertyName: kind
        mapping:
          "uri:string-value-update":  '#/components/schemas/StringValueUpdate'
          "uri:enum-value-update":    '#/components/schemas/EnumValueUpdate'
          "uri:integer-value-update": '#/components/schemas/IntegerValueUpdate'
          "uri:integer-delta-update": '#/components/schemas/IntegerDeltaUpdate'
      properties:
        kind:
          description: >-
            The kind of update.
          type: string
          xml:
            attribute: true
        path:
          description: >-
            The path this update applies to.
          type: string
          xml:
            attribute: false

    StringValueUpdate:
      description: >-
        A simple string value update.
      type: object
      title: StringValueUpdate
      required:
        - value
      allOf:
        - $ref: '#/components/schemas/AbstractUpdate'
        - type: object
          properties:
            value:
              description: >-
                The string value to use.
              type: string

    EnumValueUpdate:
      description: >-
        A simple enum value update.
      type: object
      title: EnumValueUpdate
      required:
        - value
      allOf:
        - $ref: '#/components/schemas/AbstractUpdate'
        - type: object
          properties:
            value:
              description: >-
                The enum value to use.
              type: string

    IntegerValueUpdate:
      description: >-
        A simple integer value update.
      type: object
      title: IntegerValueUpdate
      required:
        - value
      allOf:
        - $ref: '#/components/schemas/AbstractUpdate'
        - type: object
          properties:
            value:
              description: >-
                The integer value to use.
              type: integer
              format: int64
            units:
              description: >-
                The units to use for the value.
              type: string

    IntegerDeltaUpdate:
      description: >-
        A simple integer delta update.
        This increments or decrements the target value by the specified amount.
      type: object
      title: IntegerDeltaUpdate
      required:
        - delta
      allOf:
        - $ref: '#/components/schemas/AbstractUpdate'
        - type: object
          properties:
            delta:
              description: >-
                The increment or decrement to apply.
              type: integer
              format: int64
            units:
              description: >-
                The units to use for the change.
              type: string

    # TODO Move this to utils ?
    # TODO Remove this - not used.
    MinMaxDuration:
      description: >-
        A duration time block describing how long the execution will take.
        The max and min values are expressed as ISO 8601 time durations.
        See https://en.wikipedia.org/wiki/ISO_8601#Durations
      type: object
      title: MinMaxDuration
      xml:
        name: duration
      properties:
        min:
          type: string
        max:
          type: string

# abstract-session.yaml

    AbstractExecutionSession:
      description: >-
        Abstract base class for execution sessions.
      type: object
      title: AbstractExecutionSession
      required:
        - kind
      discriminator:
        propertyName: kind
        mapping:
          "https://www.purl.org/ivoa.net/Calycopis-openapi/schema/v1.0/kinds/session/simple-execution-session.yaml":    '#/components/schemas/SimpleExecutionSession'
          "https://www.purl.org/ivoa.net/Calycopis-openapi/schema/v1.0/kinds/session/scheduled-execution-session.yaml": '#/components/schemas/ScheduledExecutionSession'
         #"https://www.purl.org/ivoa.net/Calycopis-openapi/schema/v1.0/kinds/session/simple-execution-session.yaml":    './kinds/session/simple-execution-session.yaml#/components/schemas/SimpleExecutionSession'
         #"https://www.purl.org/ivoa.net/Calycopis-openapi/schema/v1.0/kinds/session/scheduled-execution-session.yaml": './kinds/session/scheduled-execution-session.yaml#/components/schemas/ScheduledExecutionSession'
      allOf:
        - $ref: '#/components/schemas/AbstractComponent'

    SimpleExecutionComponents:
      description: >-
        The combination of an executable and the compute, storage, and data resources it needs.
      type: object
      title: SimpleExecutionComponents
      properties:
        executable:
          $ref: '#/components/schemas/AbstractExecutable'
        compute:
          $ref: '#/components/schemas/AbstractComputeResource'
        storage:
          $ref: '#/components/schemas/AbstractStorageResourceList'
        data:
          $ref: '#/components/schemas/AbstractDataResourceList'

    SimpleExecutionSessionPhase:
      description: >-
        The Execution Session phase.
      type: string
      title: SimpleExecutionSessionPhase
      enum:
        - INITIAL
        - OFFERED
        - ACCEPTED
        - REJECTED
        - EXPIRED

        - WAITING
        - PREPARING
        - AVAILABLE
        - RUNNING
        - RELEASING

        - COMPLETED
        - FAILED
        - CANCELLED

    # TODO Expand this with an abstract base class and kind discriminator.
    # TODO Add nems, descriptions and logos to the derived classes.
    SimpleSessionConnector:
      description: |
        A connector to interact with the session.
      type: object
      title: SimpleSessionConnector
      properties:
        kind:
          type: string
          description: >-
            A URI to identify the type of connector.
        status:
          type: string
          enum:
            - PREPARING
            - AVAILABLE
            - FINISHED
          description: >-
            A flag to indicate the staus of the access method.
        protocol:
          type: string
          description: >-
            The access protocol, provided by the server when an offer is made.
            Typically one of [TCP, HTTP, HTTPS].
        location:
          type: string
          description: >-
            The access connector URL.

    SimpleSessionConnectorList:
      description: >-
        A list of connection endpoints.
      type: array
      title: SimpleSessionConnectorList
      xml:
        name: connector
      items:
        $ref: '#/components/schemas/SimpleSessionConnector'

    SimpleExecutionSession:
      description: >-
        A simple execution session.
      type: object
      title: SimpleExecutionSession
      xml:
        name: execution
      allOf:
        - $ref: '#/components/schemas/AbstractExecutionSession'
        - type: object
          properties:
            phase:
              $ref: '#/components/schemas/SimpleExecutionSessionPhase'
            expires:
              description: >-
                The date and time when this offer expires.
                Only valid while the state is OFFERED.
              xml:
                name: expires
              type: string
              format: date-time
        - $ref: '#/components/schemas/SimpleExecutionComponents'
        - type: object
          properties:
            connectors:
              description: >-
                A list of connectors to interact with the session.
              $ref: '#/components/schemas/SimpleSessionConnectorList'

    ScheduleDuration:
      type: object
      title: ScheduleDuration
      description: >-
        A schedule duration.
      properties:
        duration:
          $ref: './utils.yaml#/components/schemas/ISO8601Duration'

    ScheduleStartDurationInstant:
      type: object
      title: ScheduleStartDurationInstant
      description: >-
        A schedule instant and duration.
      properties:
        start:
          $ref: './utils.yaml#/components/schemas/ISO8601Instant'
        duration:
          $ref: './utils.yaml#/components/schemas/ISO8601Duration'

    ScheduleStartDurationInterval:
      type: object
      title: ScheduleStartDurationInterval
      description: >-
        A schedule interval and duration.
      properties:
        start:
          $ref: './utils.yaml#/components/schemas/ISO8601Interval'
        duration:
          $ref: './utils.yaml#/components/schemas/ISO8601Duration'

    ScheduleDoneDurationInterval:
      type: object
      title: ScheduleDoneDurationInterval
      description: >-
        A schedule interval and duration.
      properties:
        done:
          $ref: './utils.yaml#/components/schemas/ISO8601Interval'
        duration:
          $ref: './utils.yaml#/components/schemas/ISO8601Duration'

    ScheduledExecutionSchedule:
      type: object
      title: ScheduledExecutionSchedule
      description: >-
        An Execution Session schedule.
      properties:
        preparing:
          $ref: '#/components/schemas/ScheduleStartDurationInstant'
        available:
          $ref: '#/components/schemas/ScheduleStartDurationInterval'
        releasing:
          $ref: '#/components/schemas/ScheduleStartDurationInstant'

    ScheduledExecutionSession:
      type: object
      title: ScheduledExecutionSession
      description: >-
        A scheduled execution session.
      allOf:
        - $ref: '#/components/schemas/SimpleExecutionSession'
        - type: object
          properties:
            schedule:
              $ref: '#/components/schemas/ScheduledExecutionSchedule'

# offersets.yaml

    RequestedScheduleItem:
      description: >-
        The requested schedule.
      type: object
      title: RequestedScheduleItem
      properties:
        duration:
          description: >-
            The requested duration.
          $ref: './utils.yaml#/components/schemas/ISO8601Duration'
        start:
          description: >-
            The requested start interval.
          $ref: './utils.yaml#/components/schemas/ISO8601Interval'

    RequestedScheduleBlock:
      description: >-
        The requested schedule.
      type: object
      title: RequestedScheduleBlock
      properties:
        requested:
          $ref: '#/components/schemas/RequestedScheduleItem'

    ExecutionRequestComponents:
      description: >-
        The combination of an executable and the compute, storage, and data resources it needs.
      type: object
      title: ExecutionComponents
      properties:
        executable:
          $ref: '#/components/schemas/AbstractExecutable'
        compute:
          $ref: '#/components/schemas/AbstractComputeResource'
        storage:
          $ref: '#/components/schemas/AbstractStorageResourceList'
        data:
          $ref: '#/components/schemas/AbstractDataResourceList'

    ExecutionRequest:
      description: >-
        A request for a set of offers for an execution.
      type: object
      title: ExecutionRequest
      xml:
        name: offers-request
      allOf:
        - $ref: '#/components/schemas/ExecutionRequestComponents'
       #- $ref: './kinds/session/simple-execution-session.yaml#/components/schemas/SimpleExecutionComponents'
        - type: object
          properties:
            schedule:
              xml:
                name: schedule
              $ref: '#/components/schemas/RequestedScheduleBlock'
            costs:
              description: >-
                A list of cost constraints for this request.
              $ref: './kinds/costs/abstract-cost-item.yaml#/components/schemas/AbstractCostItemList'
            metrics:
              description: >-
                A list of metric requirements for this request.
              $ref: './kinds/metrics/abstract-metric-item.yaml#/components/schemas/AbstractMetricItemList'

    OfferSetResponse:
      description: >-
        A set of executions offered in response to a request,
        including a uuid, href, and an expiry date for the set.
      type: object
      title: OfferSetResponse
      xml:
        name: offers-response
      allOf:
        - $ref: '#/components/schemas/AbstractComponent'
        - type: object
          properties:
            result:
              description: >-
                A flag to indicate whether the request can be handled by this service.
                If service is able to handle the request, then the `result` will be `YES`
                and the `offers` block should contain one or more offers.
                If service is not able to handle the request, the `result` will be `NO`
                and the `messages` block should contain one or more messages explaining
                why the request was rejected.
              type: string
              enum:
                - "YES"
                - "NO"
            description:
              description: >-
                A human readable description.
              type: string
            offers:
              type: array
