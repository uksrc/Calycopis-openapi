# A GitHub workflow to build and publish libraries from the schema.
#

name: Calycopis builder

on:
  push:
    branches:
      - 'main'

  pull_request:

  workflow_dispatch:

jobs:

  build-combined-schema:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:

      # https://github.com/actions/checkout
      - name: Checkout the schema project
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Check the contents of GITHUB_ENV.
        run: |
          cat "${GITHUB_ENV}"
        shell: bash

      - name: Configure our versions
        run: |
            basepath=$(pwd)
            bin/versions.sh
        shell: bash

      - name: Check the contents of GITHUB_ENV.
        run: |
          cat "${GITHUB_ENV}"
        shell: bash

      - name: Check our environment variables.
        run: |
            echo "schemashort    [${schemashort}]"
            echo "schemaversion  [${schemaversion}]"
            echo "inputschema    [${inputschema}]"
            echo "combinedschema [${combinedschema}]"
            echo "javaversion    [${javaversion}]"
            echo "pythonversion  [${pythonversion}]"
        shell: bash

      # https://github.com/marketplace/actions/setup-python
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      # https://github.com/marketplace/actions/python-dependency-installation
      - name: Install Python dependencies
        uses: py-actions/py-dependency-install@v4
        with:
          path: isobeon/requirements.txt

      - name: Create the combined schema directory
        run: |
            mkdir --parents \
                "dirname ${{env.combinedschema}}"
        shell: bash

      - name: Run the schema processor
        run: |
          python \
            isobeon/schema-processor.py \
              '${{env.inputschema}}' \
              '${{env.combinedschema}}'

      - name: Check the result
        run: |
          head '${{env.combinedschema}}'

      - name: Check the result
        run: |
          tail '${{env.combinedschema}}'

      - name: Upload the schema file as a GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: 'calycopis-schema-schema'
          path: '${{env.combinedschema}}'


